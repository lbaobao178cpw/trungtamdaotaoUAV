name: Deploy React Client

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: Cài đặt Node.js môi trường bản mới nhất (Node 20)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # <--- Chắc chắn đã là 20 ở đây

      - name: Cài đặt thư viện và Build (Đóng gói)
        working-directory: ./frontend
        run: |
          npm install
          CI=false npm run build

      - name: Deploy gói Build lên hosting Mắt Bão
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/ 
          server-dir: ./domains/uavtrainningcenter.vn/public_html/
          protocol: ftp
          dangerous-clean-slate: false