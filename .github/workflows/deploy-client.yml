name: Deploy React Client

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: 🟢 Cài đặt Node.js (Bản 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🏗️ Cài đặt và Build React
        working-directory: ./frontend
        run: |
          npm install
          CI=false npm run build

      - name: 🚀 Deploy vào subdomain Client (Dùng tài khoản Master)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          # Dùng tài khoản chính (Master) để tránh lỗi 421
          username: ${{ secrets.FTP_USERNAME }} 
          password: ${{ secrets.FTP_PASSWORD }} 
          
          local-dir: ./frontend/dist/ 
          
          # ĐƯỜNG DẪN CHUẨN CHO SUBDOMAIN CLIENT
          server-dir: domains/client.uavtrainningcenter.vn/public_html/
          
          protocol: ftp
          port: 21
          dangerous-clean-slate: false