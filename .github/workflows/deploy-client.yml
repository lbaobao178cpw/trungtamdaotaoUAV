name: Deploy React to Subdomain Client

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: 🟢 Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🏗️ Cài đặt và Build React
        working-directory: ./frontend
        run: |
          npm install
          CI=false npm run build

      - name: 🚀 Deploy vào subdomain Client
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }} 
          password: ${{ secrets.FTP_PASSWORD }} 
          
          local-dir: ./frontend/dist/ 
          # Lưu ý: Kiểm tra xem đường dẫn này đã đúng ý bạn chưa (client hay main domain)
          server-dir: domains/client.uavtrainningcenter.vn/public_html/
          
          protocol: ftp
          port: 21
          
          # Tăng thời gian chờ lên 20 phút (1,200,000 ms)
          timeout: 1200000 
          
          # Cực kỳ quan trọng: Giúp tiếp tục upload các file còn lại nếu lần trước bị lỗi
          state-name: .ftp-deploy-sync-state.json
          
          # Bật log chi tiết để xem file nào đang làm đứng kết nối
          log-level: verbose