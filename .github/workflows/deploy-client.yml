name: Deploy React to Main Domain

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: 🟢 Cài đặt Node.js (Bản 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🏗️ Cài đặt và Build React
        working-directory: ./frontend
        run: |
          npm install
          CI=false npm run build

      - name: 🚀 Deploy vào tên miền chính (uavtrainningcenter.vn)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }} 
          password: ${{ secrets.FTP_PASSWORD }} 
          
          # Folder chứa code sau khi build xong
          local-dir: ./frontend/dist/ 
          
          # ĐƯỜNG DẪN ĐỔ VÀO TRANG CHỦ
          server-dir: /domains/uavtrainningcenter.vn/public_html/
          
          protocol: ftp
          port: 21
          
          # Tăng thời gian chờ lên 15 phút để tải đống ảnh Panorama nặng
          timeout: 900000 
          
          # Ghi nhớ các file đã upload để các lần sau deploy chỉ mất vài giây
          state-name: .ftp-deploy-sync-state.json
          
          # Hiện log chi tiết để theo dõi
          log-level: verbose
          
          # Không xóa các file hệ thống quan trọng như .htaccess
          dangerous-clean-slate: false