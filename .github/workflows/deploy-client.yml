name: Deploy Frontend to New Subdomain Structure

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: 🟢 Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🏗️ Cài đặt và Build React
        working-directory: ./frontend
        run: |
          npm install
          CI=false npm run build
        # --- PHẦN QUAN TRỌNG NHẤT ĐƯỢC THÊM VÀO ĐÂY ---
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_MEDIA_BASE_URL: ${{ secrets.VITE_MEDIA_BASE_URL }}
        # ----------------------------------------------

      - name: 🚀 Deploy vào public_html của Subdomain
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_CLIENT_USER }} 
          password: ${{ secrets.FTP_CLIENT_PASS }} 
          
          local-dir: ./frontend/dist/ 
          server-dir: ./ 
          
          protocol: ftp
          port: 21
          timeout: 900000
          state-name: .ftp-deploy-sync-state.json