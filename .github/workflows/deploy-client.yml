name: Deploy React Client

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: 🟢 Cài đặt Node.js (Bản 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🏗️ Cài đặt và Build React
        working-directory: ./frontend
        run: |
          npm install
          CI=false npm run build

      - name: 🚀 Deploy vào subdomain Client
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }} 
          password: ${{ secrets.FTP_PASSWORD }} 
          
          local-dir: ./frontend/dist/ 
          server-dir: domains/client.uavtrainningcenter.vn/public_html/
          
          protocol: ftp
          port: 21
          
          # Tăng thời gian chờ lên 15 phút (900,000ms) để không bị ngắt quãng
          timeout: 900000 
          
          # Chỉ upload những file có sự thay đổi để nhanh hơn cho các lần sau
          state-name: .ftp-deploy-sync-state.json
          
          dangerous-clean-slate: false