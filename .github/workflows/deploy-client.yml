name: Deploy Frontend to New Subdomain Structure

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Lấy mã nguồn mới nhất
        uses: actions/checkout@v4

      - name: 🟢 Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🏗️ Cài đặt và Build React
        working-directory: ./frontend
        run: |
          npm install
          CI=false npm run build

      - name: 🚀 Deploy vào public_html của Subdomain
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_CLIENT_USER }} 
          password: ${{ secrets.FTP_CLIENT_PASS }} 
          
          # Folder chứa file đã build
          local-dir: ./frontend/dist/ 
          
          # Vì tài khoản FTP đã trỏ thẳng vào public_html nên dùng ./
          server-dir: ./ 
          
          protocol: ftp
          port: 21
          timeout: 900000